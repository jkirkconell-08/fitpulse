<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="FitPulse - Tu pulso diario de bienestar">
  <meta name="theme-color" content="#0D0D0D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>FitPulse</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/app.css">
  <style>
    html,
    body {
      min-height: 100vh;
      background: #0D0D0D;
    }

    .login-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      position: relative;
      overflow: hidden;
    }

    /* Ambient glow blobs */
    .login-wrap::before {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.25) 0%, transparent 70%);
      top: -100px;
      left: -100px;
      pointer-events: none;
    }

    .login-wrap::after {
      content: '';
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(71, 118, 230, 0.2) 0%, transparent 70%);
      bottom: 0;
      right: -80px;
      pointer-events: none;
    }

    .login-content {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 360px;
      text-align: center;
    }

    .login-logo {
      width: 88px; height: 88px;
      border-radius: 28px;
      overflow: hidden;
      margin: 0 auto 24px;
    }

    .login-title {
      font-size: 2.4rem;
      font-weight: 900;
      letter-spacing: -0.06em;
      line-height: 1;
      background: linear-gradient(135deg, #fff 0%, #A78BFA 70%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    .login-sub {
      font-size: 1rem;
      color: #636366;
      font-weight: 500;
      margin-bottom: 48px;
    }

    .btn-google {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.06);
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.2s;
      margin-bottom: 14px;
    }

    .btn-google:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: translateY(-1px);
    }

    .btn-google:active {
      transform: scale(0.98);
    }

    .btn-google svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    .btn-start {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: none;
      background: linear-gradient(135deg, #7C3AED, #A78BFA);
      color: #fff;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      box-shadow: 0 8px 28px rgba(124, 58, 237, 0.45);
      margin-bottom: 14px;
    }

    .btn-start:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(124, 58, 237, 0.55);
    }

    .btn-offline {
      width: 100%;
      padding: 14px;
      border-radius: 16px;
      border: none;
      background: transparent;
      color: #636366;
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: color 0.2s;
    }

    .btn-offline:hover {
      color: #AEAEB2;
    }

    .login-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
      color: #3C3C43;
      font-size: 0.8rem;
      font-weight: 600;
    }

    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #2C2C2E;
    }

    .login-footer {
      margin-top: 36px;
      font-size: 0.75rem;
      color: #3C3C43;
      line-height: 1.6;
    }

    .login-footer a {
      color: #7C3AED;
      text-decoration: none;
    }

    #login-error {
      background: rgba(255, 69, 58, 0.12);
      border: 1px solid rgba(255, 69, 58, 0.25);
      border-radius: 12px;
      color: #FF453A;
      padding: 12px;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 16px;
      display: none;
    }
  </style>
</head>

<body>
  <div class="login-wrap">
    <div class="login-content">
      <div class="login-logo" style="padding:0;overflow:hidden;">
        <img src="icon-192.png" alt="FitPulse" style="width:100%;height:100%;object-fit:cover;display:block;border-radius:0;">
      </div>
      <h1 class="login-title">FitPulse</h1>
      <p class="login-sub">Tu pulso diario de bienestar</p>

      <div id="login-error"></div>

      <button class="btn-google" id="btn-google">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            fill="#4285F4" />
          <path
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            fill="#34A853" />
          <path
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
            fill="#FBBC05" />
          <path
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            fill="#EA4335" />
        </svg>
        Continuar con Google
      </button>

      <div class="login-divider">o</div>

      <button class="btn-start" id="btn-start">
        Empezar sin cuenta
      </button>

      <button class="btn-offline" id="btn-offline">
        Solo explorar →
      </button>

      <p class="login-footer">
        Al continuar, aceptas nuestros<br>
        <a href="privacy.html">Términos y Política de Privacidad</a>
      </p>
    </div>
  </div>

  <script src="js/firebase-config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await Auth.init();
      if (Auth.isLoggedIn()) {
        window.location.href = 'index.html';
        return;
      }

      const errEl = document.getElementById('login-error');

      document.getElementById('btn-google').addEventListener('click', async () => {
        errEl.style.display = 'none';
        const res = await Auth.loginWithGoogle();
        if (res === 'onboarding') window.location.href = 'onboarding.html';
        else if (res === 'dashboard') window.location.href = 'dashboard.html';
        else if (res) {
          errEl.textContent = 'Error al iniciar sesión. Intenta de nuevo.';
          errEl.style.display = 'block';
        }
      });

      document.getElementById('btn-start').addEventListener('click', () => {
        localStorage.setItem('fitpulse_offline', 'true');
        const config = Storage.obtenerConfig();
        if (!config.nombre || config.nombre === 'Usuario') {
          window.location.href = 'onboarding.html';
        } else {
          window.location.href = 'index.html';
        }
      });

      document.getElementById('btn-offline').addEventListener('click', () => {
        localStorage.setItem('fitpulse_offline', 'true');
        window.location.href = 'index.html';
      });
    });
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(() => { }); }
  </script>
</body>

</html>
