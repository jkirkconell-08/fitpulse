<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="FitPulse - Tu pulso diario de bienestar">
  <meta name="theme-color" content="#6C3CE1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>FitPulse - Iniciar Sesión</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/app.css">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      text-align: center;
    }
    .login-logo {
      width: 90px;
      height: 90px;
      background: linear-gradient(135deg, #6C3CE1, #8B5CF6);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      font-weight: 900;
      color: #fff;
      margin-bottom: 20px;
      box-shadow: 0 8px 30px rgba(108, 60, 225, 0.4);
    }
    .login-title {
      font-size: 2rem;
      font-weight: 900;
      color: #fff;
      margin-bottom: 6px;
      letter-spacing: -0.03em;
    }
    .login-subtitle {
      font-size: 1rem;
      color: rgba(255,255,255,0.6);
      margin-bottom: 40px;
      max-width: 280px;
    }
    .login-features {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 40px;
      max-width: 300px;
      width: 100%;
    }
    .login-feature {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      backdrop-filter: blur(10px);
    }
    .login-feature-icon {
      font-size: 1.3rem;
      flex-shrink: 0;
    }
    .login-feature-text {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.8);
      text-align: left;
    }
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      max-width: 300px;
      padding: 14px 24px;
      background: #fff;
      color: #333;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 14px rgba(0,0,0,0.15);
    }
    .btn-google:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.2); }
    .btn-google:active { transform: scale(0.98); }
    .btn-google svg { width: 20px; height: 20px; }
    .btn-skip {
      margin-top: 16px;
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 0.85rem;
      cursor: pointer;
      text-decoration: underline;
      font-family: inherit;
    }
    .btn-skip:hover { color: rgba(255,255,255,0.7); }
    .login-footer {
      margin-top: 40px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.3);
    }
    .login-footer a { color: rgba(255,255,255,0.5); }
  </style>
</head>
<body style="padding-bottom:0;">
  <div class="login-page">
    <div class="login-logo">FP</div>
    <h1 class="login-title">FitPulse</h1>
    <p class="login-subtitle">Tu pulso diario de bienestar. Nutrición, ejercicio y hábitos en un solo lugar.</p>

    <div class="login-features">
      <div class="login-feature">
        <span class="login-feature-icon">📊</span>
        <span class="login-feature-text">Dashboard semanal con progreso visual</span>
      </div>
      <div class="login-feature">
        <span class="login-feature-icon">🍽️</span>
        <span class="login-feature-text">Registro de comidas con 100+ alimentos</span>
      </div>
      <div class="login-feature">
        <span class="login-feature-icon">💪</span>
        <span class="login-feature-text">Seguimiento de ejercicios y series</span>
      </div>
      <div class="login-feature">
        <span class="login-feature-icon">☁️</span>
        <span class="login-feature-text">Datos sincronizados en la nube</span>
      </div>
    </div>

    <button id="btn-google-login" class="btn-google">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Continuar con Google
    </button>

    <button id="btn-skip-login" class="btn-skip">Usar sin cuenta (solo local)</button>

    <div class="login-footer">
      <a href="privacy.html">Política de privacidad</a> · <a href="terms.html">Términos de uso</a>
    </div>
  </div>

  <script src="js/firebase-config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cloud-sync.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Check if already logged in
    if (Auth.isLoggedIn()) {
      const config = Storage.obtenerConfig();
      if (!config.nombre || config.nombre === 'Usuario') {
        window.location.href = 'onboarding.html';
      } else {
        window.location.href = 'dashboard.html';
      }
    }

    Auth.init();

    document.getElementById('btn-google-login').addEventListener('click', async () => {
      const result = await Auth.loginWithGoogle();
      if (result === 'onboarding') window.location.href = 'onboarding.html';
      else if (result === 'dashboard') window.location.href = 'dashboard.html';
    });

    document.getElementById('btn-skip-login').addEventListener('click', () => {
      localStorage.setItem('fitpulse_user', JSON.stringify({ uid: 'local', name: 'Usuario', email: '' }));
      window.location.href = 'onboarding.html';
    });
  </script>
</body>
</html>
