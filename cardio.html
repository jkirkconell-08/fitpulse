<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <script>!function(){var t=localStorage.getItem("fitpulse_dark")||"dark";document.documentElement.className=t==="light"?"light":"dark"}();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="FitPulse - Registro de cardio y running">
  <meta name="theme-color" content="#7C3AED">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%237C3AED'/><text x='32' y='44' font-size='26' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'>FP</text></svg>">
  <title>FitPulse - Cardio</title>
  <link rel="stylesheet" href="css/app.css">
  <style>
    /* ── Cardio type grid ── */
    .cardio-type-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    .cardio-type-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
      padding: 10px 4px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: var(--bg-input);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 0.68rem;
      font-weight: 700;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }
    .cardio-type-btn.active {
      border-color: #7C3AED;
      background: rgba(124,58,237,0.15);
      color: #A78BFA;
    }
    .cardio-type-btn:hover:not(.active) {
      border-color: rgba(124,58,237,0.4);
      background: rgba(124,58,237,0.06);
    }
    .cfg-label {
      display: block;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    /* ── Cardio history ── */
    .cardio-hist-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: var(--bg-input);
      border-radius: 12px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <header class="app-header">
    <a href="dashboard.html" class="logo">
      <div class="logo-icon"><img src="icon-192.png" alt="FitPulse"></div>
      <span class="logo-text">FitPulse</span>
    </a>
    <div class="header-actions">
      <div id="dark-toggle" class="dark-toggle">
        <span class="toggle-icon icon-sun"><i data-lucide="sun" style="width:16px;height:16px;"></i></span>
        <span class="toggle-icon icon-moon"><i data-lucide="moon" style="width:16px;height:16px;"></i></span>
      </div>
    </div>
  </header>
  <main class="container">
    <h1 class="page-title">Cardio</h1>
    <p class="page-subtitle">Registro de actividad cardiovascular</p>
    <div id="cardio-container"></div>
  </main>
  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>Inicio</span></a>
    <a href="index.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><span>Hoy</span></a>
    <a href="comidas.html" class="nav-item"><svg viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg><span>Comidas</span></a>
    <a href="ejercicios.html" class="nav-item active"><svg viewBox="0 0 24 24"><path d="M6.5 6.5h11"/><path d="M6.5 17.5h11"/><path d="M12 6.5v11"/><rect x="2" y="4" width="4" height="16" rx="1"/><rect x="18" y="4" width="4" height="16" rx="1"/></svg><span>Gym</span></a>
    <a href="menu.html" class="nav-item"><svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg><span>Más</span></a>
  </nav>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.469.0/umd/lucide.min.js" defer></script>
  <script src="js/icons.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cloud-sync.js"></script>
  <script src="js/app.js"></script>
  <script src="js/cardio.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await Auth.init();
      if (!Auth.requireAuth()) return;
      Cardio.init();
    });
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(() => {}); }
  </script>
</body>
</html>
