      <a href="config.html" class="menu-card"><div class="menu-card-icon"><svg class="icon icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></div><div class="menu-card-label">Configuración</div><div class="menu-card-desc">Perfil y datos</div></a>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cloud-sync.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await Auth.init();
      const ok = await Auth.requireAuth();
      if (!ok) return;
      initDarkMode();
      Auth._updateUI();

      // Account card
      const user = Auth.getUser();
      const isOffline = localStorage.getItem('fitpulse_offline') === 'true';
      document.getElementById('account-card').innerHTML = `
        <h3 style="margin-bottom:10px;"><svg class="icon icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> Cuenta</h3>
        <div style="display:flex;align-items:center;gap:12px;">
          ${user?.photo || user?.photoURL
            ? `<img src="${user.photo || user.photoURL}" style="width:44px;height:44px;border-radius:50%;object-fit:cover;" alt="">`
            : `<div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#7C3AED,#A78BFA);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1.2rem;color:#fff;">${(user?.name||user?.displayName||'?')[0]}</div>`
          }
          <div>
            <div style="font-weight:700;font-size:0.95rem;">${user?.name || user?.displayName || 'Sin nombre'}</div>
            <div style="font-size:0.8rem;color:var(--text-muted);">${user?.email || (isOffline ? 'Modo offline' : 'Sin cuenta')}</div>
          </div>
        </div>
        <button id="btn-logout" class="btn btn-secondary btn-full" style="margin-top:14px;">
          ${isOffline
            ? `<i data-lucide="log-in" style="width:18px;height:18px;vertical-align:middle;margin-right:6px;"></i>Iniciar sesión con Google`
            : `<i data-lucide="log-out" style="width:18px;height:18px;vertical-align:middle;margin-right:6px;"></i>Cerrar sesión`}
        </button>
      `;
      document.getElementById('btn-logout').addEventListener('click', () => {
        if (isOffline) window.location.href = 'login.html';
        else Auth.logout();
      });
      if (window.lucide) lucide.createIcons();

      // Sync card
      const lastSync = localStorage.getItem('fitpulse_last_sync');
      document.getElementById('sync-card').innerHTML = `
        <h3 style="margin-bottom:10px;"><svg class="icon icon-lg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 10h-1.26A8 8 0 109 20h9a5 5 0 000-10z"/></svg> Sincronización</h3>
        <div style="font-size:0.8rem;color:var(--text-muted);margin-bottom:12px;">
          ${isOffline ? '<i data-lucide="wifi-off" style="width:16px;height:16px;vertical-align:middle;margin-right:4px;color:#FFD60A;"></i> Offline — los datos se guardan solo en este dispositivo'
            : `<i data-lucide="check-circle" class="icon icon-md" style="width:18px;height:18px;color:#30D158;"></i> Nube activa · ${lastSync ? 'Último sync: ' + new Date(parseInt(lastSync)).toLocaleTimeString() : 'Pendiente'}`}
        </div>
        <div style="display:flex;gap:8px;">
          <button id="btn-sync-up" class="btn btn-secondary" style="flex:1;font-size:0.85rem;"><i data-lucide="upload-cloud" class="icon icon-md" style="width:18px;height:18px;"></i> Subir</button>
          <button id="btn-sync-down" class="btn btn-secondary" style="flex:1;font-size:0.85rem;"><i data-lucide="download-cloud" class="icon icon-md" style="width:18px;height:18px;"></i> Descargar</button>
        </div>
      `;
      document.getElementById('btn-sync-up').addEventListener('click', async () => {
        if (isOffline) { showToast('Inicia sesión para sincronizar', 'warning'); return; }
        showToast('Subiendo datos...');
        await CloudSync.pushToCloud();
        localStorage.setItem('fitpulse_last_sync', Date.now());
        showToast('<i data-lucide="check-circle" class="icon icon-md" style="width:18px;height:18px;color:#30D158;"></i> Datos subidos a la nube');
      });
      document.getElementById('btn-sync-down').addEventListener('click', async () => {
        if (isOffline) { showToast('Inicia sesión para sincronizar', 'warning'); return; }
        showToast('Descargando desde la nube...');
        await CloudSync.forceDownload();
      });
    });
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(() => {}); }
  </script>
