<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="FitPulse - Hoy">
  <meta name="theme-color" content="#0D0D0D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>FitPulse - Hoy</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%237C3AED'/><text x='32' y='44' font-size='26' text-anchor='middle' fill='white' font-family='Arial' font-weight='bold'>FP</text></svg>">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <div id="notif-banner" class="notif-banner" onclick="Notificaciones.solicitarPermiso()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
    <span>Activa las notificaciones para no olvidar tu plan</span>
  </div>
  <header class="app-header">
    <a href="dashboard.html" class="logo"><div class="logo-icon"><img src="icon-192.png" alt="FitPulse"></div><span class="logo-text">FitPulse</span></a>
    <div class="header-actions">
      <div id="user-avatar" class="user-avatar"></div>
      <div id="dark-toggle" class="dark-toggle" title="Modo oscuro"><span class="toggle-icon icon-sun"><i data-lucide="sun" style="width:16px;height:16px;"></i></span><span class="toggle-icon icon-moon"><i data-lucide="moon" style="width:16px;height:16px;"></i></span></div>
    </div>
  </header>
  <main class="container">
    <div id="fecha-display" class="fecha-display"></div>
    <div id="stats-row" class="stats-row"></div>
    <div id="water-widget" class="water-widget"></div>
    <div id="checklist-container"></div>
    <div id="nota-container" class="nota-section"></div>
  </main>
  <div id="nota-overlay" class="overlay">
    <div class="overlay-content"><h2>⏰ ¡Alto!</h2><p>Son más de las 9:00 PM y no has escrito tu nota del día.</p><textarea id="overlay-nota" placeholder="Escribe qué comiste, cómo te sentiste..."></textarea><button id="overlay-guardar" class="btn btn-primary btn-full">Guardar nota</button></div>
  </div>
  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item" id="nav-dashboard"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span>Inicio</span></a>
    <a href="index.html" class="nav-item active" id="nav-checklist"><svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><span>Hoy</span></a>
    <a href="comidas.html" class="nav-item" id="nav-comidas"><svg viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg><span>Comidas</span></a>
    <a href="ejercicios.html" class="nav-item" id="nav-gym"><svg viewBox="0 0 24 24"><path d="M6.5 6.5h11"/><path d="M6.5 17.5h11"/><path d="M12 6.5v11"/><rect x="2" y="4" width="4" height="16" rx="1"/><rect x="18" y="4" width="4" height="16" rx="1"/></svg><span>Gym</span></a>
    <a href="menu.html" class="nav-item" id="nav-menu"><svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg><span>Más</span></a>
  </nav>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script src="js/icons.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cloud-sync.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      await Auth.init();
      const ok = await Auth.requireAuth();
      if (!ok) return;
      App.init();
      CloudSync.scheduleSync();
    });
    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js').catch(() => {}); }
  </script>
</body>
</html>
